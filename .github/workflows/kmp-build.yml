name: KMP Build (Android + iOS)

on:
  push:
    branches: [main]
    paths:
      - 'Example-KMP-Mobile/**'
      - 'src/**'
      - '.github/workflows/kmp-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Example-KMP-Mobile/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Example-KMP-Mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Android APK
        run: ./gradlew :androidApp:assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: Example-KMP-Mobile/androidApp/build/outputs/apk/release/*.apk

  ios-build:
    name: iOS Simulator Build
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: Example-KMP-Mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS Simulator Framework (Rust builds automatically via plugin)
        run: ./gradlew :composeApp:linkReleaseFrameworkIosSimulatorArm64 --no-daemon

      - name: Build iOS Simulator App
        run: |
          cd iosApp
          xcodebuild build \
            -scheme "iosApp" \
            -configuration Release \
            -sdk iphonesimulator \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            SKIP_INSTALL=YES

      - name: Upload iOS Simulator App (for Appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: Example-KMP-Mobile/iosApp/build/Build/Products/Release-iphonesimulator/*.app

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: Example-KMP-Mobile/composeApp/build/bin/iosSimulatorArm64/releaseFramework/
